# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
COMMON_FLAGS="-O2 -pipe -march=armv8.6-a+fp16+simd+crypto+i8mm+bf16 -mtune=native -flto=thin"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"
RUSTFLAGS="-C target-cpu=native"

CC="clang"
CXX="clang++"
CPP="clang-cpp"
AR="llvm-ar"
NM="llvm-nm"
RANLIB="llvm-ranlib"
LDFLAGS="${LDFLAGS} -flto=thin -fuse-ld=lld"

MAKEOPTS="-j8"
VIDEO_CARDS="asahi"
GRUB_PLATFORMS="efi-64"

USE="-static-libs -systemd -vlc -webengine pipewire pulseaudio screencast"

ACCEPT_LICENSE="-* @FREE @BINARY-REDISTRIBUTABLE YDSLA"

FEATURES="getbinpkg binpkg-request-signature"                                                                                                                                                                                
EMERGE_DEFAULT_OPTS="--binpkg-respect-use=y"

# WARNING: Changing your CHOST is not something that should be done lightly.
# Please consult https://wiki.gentoo.org/wiki/Changing_the_CHOST_variable before changing.
CHOST="aarch64-unknown-linux-gnu"

# NOTE: This stage was built with the bindist USE flag enabled

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C.UTF-8
